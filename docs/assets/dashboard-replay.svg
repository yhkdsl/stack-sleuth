  <circle cx="114" cy="445" r="12" fill="#16a34a"/>
  <text x="146" y="452" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">run_read_only_query</text>
  <text x="146" y="482" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">SELECT id, account_status, profile_img FROM users WHERE id = 42 · 31 ms</text>

  <rect x="744" y="250" width="398" height="132" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
