  <text x="774" y="322" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">Three recent errors point to a NullPointerException in ProfileService.</text>
  <text x="774" y="348" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">user 42 has a null profile_img value.</text>

