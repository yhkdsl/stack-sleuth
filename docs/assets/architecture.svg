<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">StackSleuth architecture diagram</title>
  <desc id="desc">A bounded AI backend investigation flow from CLI to FastAPI, OpenAI, Spring tools, PostgreSQL and logs, then redacted trace replay in a dashboard.</desc>
  <rect width="1200" height="540" fill="#f8fafc"/>
  <text x="60" y="72" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">StackSleuth: bounded backend investigation agent</text>
  <text x="60" y="108" font-family="Inter, Arial, sans-serif" font-size="17" fill="#475569">The model chooses tools, but application boundaries enforce execution, storage, and replay policy.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <g font-family="Inter, Arial, sans-serif" filter="url(#shadow)">
    <rect x="60" y="165" width="170" height="112" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="86" y="204" font-size="18" font-weight="700" fill="#0f172a">Terminal CLI</text>
    <text x="86" y="234" font-size="14" fill="#475569">ops-agent ask</text>
    <text x="86" y="256" font-size="14" fill="#475569">trace replay</text>

    <rect x="290" y="165" width="190" height="112" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="318" y="204" font-size="18" font-weight="700" fill="#0f172a">FastAPI Agent</text>
    <text x="318" y="234" font-size="14" fill="#475569">Responses API loop</text>
    <text x="318" y="256" font-size="14" fill="#475569">timeouts, redaction</text>

    <rect x="540" y="95" width="190" height="112" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="568" y="134" font-size="18" font-weight="700" fill="#0f172a">OpenAI</text>
    <text x="568" y="164" font-size="14" fill="#475569">strict tool calls</text>
    <text x="568" y="186" font-size="14" fill="#475569">final answer</text>

    <rect x="540" y="265" width="190" height="112" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="568" y="304" font-size="18" font-weight="700" fill="#0f172a">Spring Tool Server</text>
    <text x="568" y="334" font-size="14" fill="#475569">health, logs, SQL</text>
    <text x="568" y="356" font-size="14" fill="#475569">auth and guardrails</text>

    <rect x="790" y="265" width="160" height="112" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="818" y="304" font-size="18" font-weight="700" fill="#0f172a">Data Sources</text>
    <text x="818" y="334" font-size="14" fill="#475569">PostgreSQL reader</text>
    <text x="818" y="356" font-size="14" fill="#475569">sample logs</text>

    <rect x="790" y="95" width="160" height="112" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="818" y="134" font-size="18" font-weight="700" fill="#0f172a">Trace Store</text>
    <text x="818" y="164" font-size="14" fill="#475569">redacted JSON</text>
    <text x="818" y="186" font-size="14" fill="#475569">persisted flag</text>

    <rect x="1010" y="95" width="140" height="112" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1036" y="134" font-size="18" font-weight="700" fill="#0f172a">React</text>
    <text x="1036" y="164" font-size="14" fill="#475569">trace dashboard</text>
    <text x="1036" y="186" font-size="14" fill="#475569">sample replay</text>
  </g>

  <g stroke="#64748b" stroke-width="2.2" fill="none" marker-end="url(#arrow)">
    <path d="M230 221 H290"/>
    <path d="M480 205 C515 175 520 150 540 150"/>
    <path d="M730 150 H790"/>
    <path d="M480 240 C520 270 520 320 540 320"/>
    <path d="M730 320 H790"/>
    <path d="M870 265 V207"/>
    <path d="M950 150 H1010"/>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="60" y="420" width="1090" height="72" rx="12" fill="#ecfdf5" stroke="#86efac"/>
    <text x="86" y="450" font-size="16" font-weight="700" fill="#166534">Safety boundary</text>
    <text x="86" y="474" font-size="14" fill="#166534">The CLI and dashboard never call Spring internal tool endpoints. FastAPI owns model orchestration and trace replay; Spring owns narrow tool execution.</text>
  </g>
</svg>
