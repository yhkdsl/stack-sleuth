server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health

stacksleuth:
  tool-server:
    auth-enabled: true
    token: ${TOOL_SERVER_TOKEN:local-dev-token}
    sql-max-rows: ${SQL_MAX_ROWS:50}
    log-max-matches: ${LOG_MAX_MATCHES:100}
    sample-log-path: ${SAMPLE_LOG_PATH:infra/sample-logs/app.log}
