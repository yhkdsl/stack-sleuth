name: stacksleuth

services:
  postgres:
    image: postgres:17.5-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stacksleuth}
      POSTGRES_USER: ${POSTGRES_USER:-stacksleuth_owner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      TOOL_DB_USER: ${TOOL_DB_USER:-stacksleuth_reader}
      TOOL_DB_PASSWORD: ${TOOL_DB_PASSWORD:?TOOL_DB_PASSWORD must be set}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - stacksleuth-postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready --username "$${POSTGRES_USER}" --dbname "$${POSTGRES_DB}"
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

volumes:
  stacksleuth-postgres-data:
