name: Python Agent Service CI

on:
  pull_request:
    paths:
      - "python-agent-service/**"
      - "evals/**"
      - "examples/python-agent/**"
      - "docs/**"
      - "README.md"
      - ".env.example"
      - ".github/workflows/python-agent-ci.yml"
  push:
    branches:
      - main
    paths:
      - "python-agent-service/**"
      - "evals/**"
      - "examples/python-agent/**"
      - "docs/**"
      - "README.md"
      - ".env.example"
      - ".github/workflows/python-agent-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: python-agent-service
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install locked dependencies
        run: uv sync --locked --all-groups

      - name: Lint
        run: uv run ruff check . ../examples/python-agent/mock_investigation.py ../evals/run_evals.py

      - name: Test
        run: uv run pytest -q --cov=app --cov-report=term-missing --cov-fail-under=90

      - name: Run credential-free example
        run: uv run python ../examples/python-agent/mock_investigation.py

      - name: Run deterministic eval scenarios
        run: uv run python ../evals/run_evals.py

      - name: Validate deterministic fixtures
        run: bash ../infra/scripts/verify-fixtures.sh

      - name: Validate documentation and examples
        run: node ../infra/scripts/verify-documentation.mjs
